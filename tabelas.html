<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 07: Tabelas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
    <table>
        <caption>Estátisticas dos Pokémons</caption>
        <thead>
            <tr>
                <th>pokemon</th>
                <th>hp</th>
                <th>cp</th>
                <th>sp</th>
            </tr>
        </thead>
        <tfoot>
            <tr>
                <td colspan="4">Feito na aula de 30/04/2026</td>
            </tr>
        </tfoot>
        <tbody>
            <tr>
                <td>pikachu</td>
                <td>30</td>
                <td>20</td>
                <td>50</td>
            </tr>
            <tr>
                <td>bulbasaur</td>
                <td>60</td>
                <td>20</td>
                <td>30</td>
            </tr>
            <tr>
                <td>charmander</td>
                <td>25</td>
                <td>40</td>
                <td>20</td>
            </tr>
        </tbody>
    </table>
    <a href="index.html">Voltar para a página principal</a>
</body>
</html>
